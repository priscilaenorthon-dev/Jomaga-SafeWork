<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeWork Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      font-family: Arial, Helvetica, sans-serif;
      color: #0f172a;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 22px;
      color: #1A237E;
    }
    p {
      margin: 0;
      font-size: 14px;
      color: #475569;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está offline</h1>
    <p>O SafeWork mantém as telas mais recentes em cache para consulta. Reconecte-se para sincronizar novos dados.</p>
  </div>
</body>
</html>
